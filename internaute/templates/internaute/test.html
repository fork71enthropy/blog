{% extends "base.html" %}


{% block content %}
    <h1> Subscribe to devlog.py </h1>
    <p> You will receive an email once per week when I make a security post ! </p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            {{field}}
            {% if field.errors %}
                <p style="color: red;"> {{field.errors}} </p>
            {% endif %}
        {% endfor %}
        <button type="submit">S'abonner</button>
    </form>
    <p> {{form}} </p>
{% endblock %}
