{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 60px auto;">
    <h2>S'abonner à devlog.py</h2>
    <p>You will receive an email once per week when I make a security post !</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div style="margin-bottom: 16px;">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p style="color: red;">{{ field.errors }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit">S'abonner</button>
    </form>
</div>
{% endblock %}
