<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DevLog{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #141414;
      --border:    #222;
      --muted:     #555;
      --text:      #d4d0c8;
      --heading:   #f0ece0;
      --accent:    #c8a96e;
      --accent-dim:#7a6540;
      --code-bg:   #1a1a1a;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono:  'DM Mono', 'Courier New', monospace;
      --font-sans:  'Geist', system-ui, sans-serif;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .header-inner {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .logo span {
      color: var(--muted);
    }

    nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav a {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--heading); }

    /* ── MAIN ────────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 4rem 2rem;
      width: 100%;
    }

    /* ── TYPOGRAPHY ──────────────────────────────────────── */
    h1, h2, h3, h4 {
      font-family: var(--font-serif);
      color: var(--heading);
      font-weight: 400;
      line-height: 1.25;
    }

    h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 0.5rem; }
    h2 { font-size: 1.5rem; margin: 2.5rem 0 0.75rem; }
    h3 { font-size: 1.2rem; margin: 2rem 0 0.5rem; }

    p { margin-bottom: 1.25rem; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; text-decoration-color: var(--accent-dim); }

    /* ── POST META ───────────────────────────────────────── */
    .post-meta {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      letter-spacing: 0.04em;
    }

    .post-meta .tag {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 0.15rem 0.55rem;
      border-radius: 3px;
      margin-left: 0.75rem;
      font-size: 0.7rem;
    }

    /* ── CODE ────────────────────────────────────────────── */
    code {
      font-family: var(--font-mono);
      font-size: 0.82em;
      background: var(--code-bg);
      color: #a8d8a8;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-dim);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      position: relative;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      color: #c9d1d9;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* ── HR ──────────────────────────────────────────────── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* ── BLOCKQUOTE ──────────────────────────────────────── */
    blockquote {
      border-left: 3px solid var(--accent-dim);
      padding: 0.5rem 1.25rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-style: italic;
    }

    /* ── FOOTER ──────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
    }

    .footer-inner {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .footer-inner a { color: var(--muted); }
    .footer-inner a:hover { color: var(--accent); text-decoration: none; }

    .footer-links { display: flex; gap: 1.5rem; }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .header-inner { padding: 0 1rem; }
      main { padding: 2rem 1rem; }
      .footer-inner { flex-direction: column; gap: 1rem; text-align: center; }
      nav { gap: 1.25rem; }
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-inner">
      <a class="logo" href="/">devlog<span>.py</span></a>
      <nav>
        <a href="/">Articles</a>
        <a href="/about">About</a>
        <a href="https://github.com" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <!-- ── CONTENT ── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="footer-inner">
      <span>Built with Django — real experience, not tutorials.</span>
      <div class="footer-links">
        <a href="/">Articles</a>
        <a href="https://github.com" target="_blank">GitHub</a>
        <a href="/rss">RSS</a>
      </div>
    </div>
  </footer>

  {% block extra_js %}{% endblock %}
</body>
</html>
